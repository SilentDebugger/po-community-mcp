on:
  workflow_call:
    inputs:
      AZURE_WEBAPP_NAME:
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: typescript

      - name: Type check
        run: npm run typecheck
        working-directory: typescript

      - name: Lint
        run: npm run lint
        working-directory: typescript

      - name: Build
        run: npm run build
        working-directory: typescript

      - name: Login to azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to app service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.AZURE_WEBAPP_NAME }}
          package: typescript

      - name: Logout from azure
        run: |
          az logout
